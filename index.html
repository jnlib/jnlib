<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>종로도서관 민원 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#09192A;--blue:#1660B8;--teal:#08A89A;--gold:#E6991A;--green:#12A05A;--cream:#F6F2EA;--white:#fff;--ink:#1a1a1f;--ink2:#56565e;--ink3:#a0a0aa}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);display:flex;justify-content:center;align-items:center}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(22,96,184,.3),transparent 65%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(8,168,154,.22),transparent 65%)}
.shell{width:100%;max-width:430px;height:100svh;position:relative;z-index:1;display:flex;flex-direction:column;background:var(--cream);overflow:hidden}
.hdr{background:var(--navy);padding:12px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0;position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--blue) 30%,var(--teal) 70%,transparent)}
.hdr-av{width:36px;height:36px;border-radius:10px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr-av img{width:100%;height:100%;object-fit:contain;display:block}
.hdr-name{font-size:13px;font-weight:700;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.prog{height:3px;background:rgba(0,0,0,.1);flex-shrink:0}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .4s ease}
.screens{flex:1;position:relative;overflow:hidden;min-height:0}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .38s ease;overflow:hidden}
.screen.hide-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.hide-right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.show{transform:translateX(0);opacity:1;pointer-events:all}

/* S0 인트로 */
#s0{background:var(--navy);align-items:center;justify-content:center}
.blob{position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none;animation:blobF ease-in-out infinite}
.bl1{width:260px;height:260px;background:rgba(22,96,184,.28);top:-80px;right:-60px;animation-duration:8s}
.bl2{width:180px;height:180px;background:rgba(8,168,154,.2);bottom:60px;left:-60px;animation-duration:9s;animation-delay:3s}
@keyframes blobF{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.s0-inner{display:flex;flex-direction:column;align-items:center;padding:32px 28px 44px;position:relative;z-index:1}
.mascot-wrap{position:relative;margin-bottom:28px;display:flex;align-items:center;justify-content:center}
.m-ring{position:absolute;border-radius:38px;border:1.5px solid rgba(22,96,184,.35);top:50%;left:50%;transform:translate(-50%,-50%);animation:rP 3s ease-in-out infinite}
.mr1{width:214px;height:214px}
.mr2{width:238px;height:238px;border-color:rgba(8,168,154,.2);animation-delay:.7s}
@keyframes rP{0%,100%{opacity:.8}50%{opacity:.2}}
.mascot{width:190px;height:190px;border-radius:36px;background:linear-gradient(145deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:88px;position:relative;z-index:1;overflow:visible;box-shadow:0 0 55px rgba(22,96,184,.55),0 24px 56px rgba(0,0,0,.45);animation:mH 4s ease-in-out infinite}
.mascot.no-bg{background:none;box-shadow:none;border-radius:0}
.mascot img{width:100%;height:100%;object-fit:contain;display:block;border-radius:inherit}
.mascot.no-bg img{filter:drop-shadow(0 0 30px rgba(22,96,184,.7)) drop-shadow(0 14px 28px rgba(0,0,0,.45))}
@keyframes mH{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.s0-lib{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);text-align:center;margin-bottom:6px}
.s0-title{font-size:26px;font-weight:900;color:#fff;text-align:center;line-height:1.3;margin-bottom:9px}
.s0-sub{font-size:13.5px;color:rgba(255,255,255,.45);text-align:center;line-height:1.7;margin-bottom:36px}
.start-btn{width:100%;max-width:300px;padding:18px 24px;border:none;border-radius:22px;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--teal));box-shadow:0 8px 28px rgba(22,96,184,.45),inset 0 1px 0 rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;gap:12px;transition:transform .15s;animation:bIn .6s .4s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes bIn{from{transform:scale(.85) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.start-btn:active{transform:scale(.96)}
.start-btn-ico{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.start-btn-main{display:block;font-size:17px;font-weight:800;color:#fff;font-family:'Noto Sans KR',sans-serif;text-align:left}
.start-btn-sub{display:block;font-size:11px;color:rgba(255,255,255,.65);font-family:'Noto Sans KR',sans-serif;margin-top:2px;text-align:left}

/* S1 카테고리 */
#s1{background:var(--cream);padding:18px;overflow-y:auto}
#s1::-webkit-scrollbar{width:0}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.mini-av{width:32px;height:32px;border-radius:9px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:15px}
.mini-av img{width:100%;height:100%;object-fit:contain}
.cat-title{font-size:16px;font-weight:700;color:var(--navy)}
.cat-hint{font-size:12px;color:var(--ink3);padding-left:42px;margin-bottom:16px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-card{background:#fff;border-radius:18px;padding:16px 12px 13px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border:2.5px solid transparent;box-shadow:0 2px 12px rgba(0,0,0,.07);transition:all .18s ease;position:relative;overflow:hidden;user-select:none}
.cat-card:active{transform:scale(.95)}
.cat-card.sel{border-color:var(--blue);background:linear-gradient(135deg,rgba(22,96,184,.07),rgba(8,168,154,.04));box-shadow:0 4px 20px rgba(22,96,184,.2)}
.cat-ico-box{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative}
.cat-ico-bg{position:absolute;inset:0;border-radius:15px;opacity:.2}
.cat-lbl{font-size:13px;font-weight:700;color:var(--ink);text-align:center}
.cat-desc{font-size:10px;color:var(--ink3);text-align:center;line-height:1.4}
.sel-dot{position:absolute;top:9px;right:9px;width:18px;height:18px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transform:scale(0);transition:transform .2s cubic-bezier(.175,.885,.32,1.275)}
.cat-card.sel .sel-dot{transform:scale(1)}

/* S2 작성 */
#s2{background:var(--cream)}
.s2-bar{background:var(--navy);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative}
.s2-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.s2-ico{font-size:20px;flex-shrink:0}
.s2-name{font-size:14px;font-weight:700;color:#fff}
.s2-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.s2-form{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;min-height:0}
.s2-form::-webkit-scrollbar{width:0}
.f-label{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.ta{width:100%;height:140px;background:#fff;border:2px solid rgba(0,0,0,.08);border-radius:16px;padding:13px 15px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--ink);line-height:1.65;resize:none;outline:none;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:border .2s,box-shadow .2s;display:block}
.ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(22,96,184,.1)}
.char-cnt{font-size:11px;color:var(--ink3);text-align:right;margin-top:4px}
.photo-box{border:1.5px dashed rgba(0,0,0,.14);border-radius:14px;padding:12px 14px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:10px;position:relative;transition:border-color .18s}
.photo-box:hover{border-color:var(--blue)}
.photo-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.photo-ico{width:36px;height:36px;border-radius:10px;background:rgba(22,96,184,.1);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.photo-txt{font-size:12px;font-weight:600;color:var(--ink2)}
.photo-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.thumb-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.tw{position:relative;display:inline-block}
.th-img{width:58px;height:58px;border-radius:10px;object-fit:cover;border:2px solid rgba(22,96,184,.35);display:block}
.th-del{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#d93030;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;font-weight:700}

/* S3 완료 */
#s3{background:var(--navy)}
.done-top{flex:1;display:flex;align-items:center;justify-content:center;background:var(--navy);position:relative;min-height:0}
.done-top::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(22,96,184,.28),transparent 70%)}
.done-mascot{width:160px;height:160px;border-radius:36px;z-index:1;background:linear-gradient(145deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:76px;overflow:visible;animation:mH 3.5s ease-in-out infinite}
.done-mascot.no-bg{background:none;border-radius:0}
.done-mascot img{width:100%;height:100%;object-fit:contain;border-radius:36px}
.done-mascot.no-bg img{border-radius:0;filter:drop-shadow(0 0 28px rgba(22,96,184,.8))}
.done-bot{background:var(--cream);border-radius:28px 28px 0 0;padding:22px 20px 20px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;animation:sU .4s .1s ease both}
@keyframes sU{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.done-bubble{background:#fff;border-radius:4px 20px 20px 20px;padding:16px 18px;box-shadow:0 3px 14px rgba(0,0,0,.08);position:relative}
.done-bubble::before{content:'';position:absolute;top:0;left:-6px;border:7px solid transparent;border-right-color:#fff;border-top-color:#fff}
.done-msg{font-size:15px;color:var(--ink);line-height:1.75}
.del-card{background:rgba(18,160,90,.1);border:1.5px solid rgba(18,160,90,.28);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:13px;animation:sU .4s .25s ease both}
.del-ico-wrap{position:relative;flex-shrink:0}
.del-ico{width:44px;height:44px;border-radius:12px;background:rgba(18,160,90,.16);display:flex;align-items:center;justify-content:center;font-size:20px}
.del-ring{position:absolute;border-radius:50%;border:2px solid rgba(18,160,90,.4);animation:dR 1.5s ease-out forwards}
.del-ring:nth-child(2){animation-delay:.3s}.del-ring:nth-child(3){animation-delay:.6s}
@keyframes dR{from{width:44px;height:44px;top:0;left:0;opacity:.8}to{width:82px;height:82px;top:-19px;left:-19px;opacity:0}}
.del-info{flex:1}
.del-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:2px}
.del-sub{font-size:11px;color:var(--ink3)}
.del-badge{background:rgba(18,160,90,.14);border:1px solid rgba(18,160,90,.28);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--green);flex-shrink:0}
.again-btn{font-size:13px;color:var(--ink3);text-decoration:underline;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center}

/* 네비 */
.bottom{padding:10px 18px 14px;flex-shrink:0;background:var(--cream);border-top:1px solid rgba(0,0,0,.07)}
.nav-row{display:flex;gap:10px}
.btn-back{width:50px;height:50px;border-radius:14px;background:#fff;border:1.5px solid rgba(0,0,0,.1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .15s}
.btn-back:disabled{opacity:.28;cursor:not-allowed}
.btn-next{flex:1;height:50px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 5px 20px rgba(22,96,184,.35);transition:all .15s}
.btn-next:active{transform:scale(.97)}
.btn-next:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
#cvs{position:fixed;inset:0;pointer-events:none;z-index:9999}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(9,25,42,.9);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;pointer-events:none;opacity:0;transition:all .28s;z-index:8888;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── S3 분석 로딩 ── */
.spin-orb{width:130px;height:130px;border-radius:50%;background:conic-gradient(from 0deg,var(--blue),var(--teal),var(--gold),var(--blue));display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:orbSpin 2.2s linear infinite;box-shadow:0 0 50px rgba(22,96,184,.4)}
@keyframes orbSpin{to{transform:rotate(360deg)}}
.spin-inner{width:108px;height:108px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:46px;animation:orbSpin 2.2s linear infinite reverse;overflow:hidden}
.spin-inner img{width:100%;height:100%;object-fit:contain;border-radius:50%}
.spin-inner.no-bg{background:none}
.spin-inner.no-bg img{filter:drop-shadow(0 0 16px rgba(22,96,184,.9))}
.spin-title{font-size:17px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px}
.spin-sub{font-size:13px;color:rgba(255,255,255,.42);text-align:center;margin-bottom:18px}
.spin-dots{display:flex;gap:8px;justify-content:center}
.spin-dots span{width:9px;height:9px;border-radius:50%;animation:dotB 1.2s ease-in-out infinite}
.spin-dots span:nth-child(1){background:#2278D4}
.spin-dots span:nth-child(2){background:var(--teal);animation-delay:.2s}
.spin-dots span:nth-child(3){background:var(--gold);animation-delay:.4s}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1.1);opacity:1}}
/* 말풍선 타이핑 커서 */
.t-cursor{display:inline-block;width:2px;height:1em;background:var(--teal);margin-left:2px;vertical-align:middle;animation:tcBlink .7s step-end infinite}
@keyframes tcBlink{0%,100%{opacity:1}50%{opacity:0}}
.ai-key{color:var(--blue);font-weight:700}
@keyframes ldot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div class="toast" id="toast"></div>
<div class="shell">
  <div class="hdr">
    <div class="hdr-av" id="hdrAv">&#128218;</div>
    <div>
      <div class="hdr-name" id="hdrName">종로도서관 민원 도우미</div>
      <div class="hdr-sub">AI 응대 중 · 온라인</div>
    </div>
  </div>
  <div class="prog"><div class="prog-fill" id="progFill"></div></div>
  <div class="screens">

    <!-- S0 인트로 -->
    <div class="screen show" id="s0">
      <div class="blob bl1"></div><div class="blob bl2"></div>
      <div class="s0-inner">
        <div class="mascot-wrap">
          <div class="m-ring mr2"></div><div class="m-ring mr1"></div>
          <div class="mascot" id="m0">&#128218;</div>
        </div>
        <div class="s0-lib" id="s0Lib">종로도서관</div>
        <div class="s0-title" id="s0Title">무엇을<br>도와드릴까요?</div>
        <div class="s0-sub" id="s0Sub">불편하신 사항을 접수해 주시면<br>담당자에게 즉시 전달해 드립니다.</div>
        <button class="start-btn" onclick="go(1)">
          <div class="start-btn-ico">&#128203;</div>
          <div>
            <span class="start-btn-main">민원 접수하기</span>
            <span class="start-btn-sub">AI가 즉시 분석 · 담당자 전달</span>
          </div>
        </button>
      </div>
    </div>

    <!-- S1 카테고리 -->
    <div class="screen hide-right" id="s1">
      <div class="cat-hdr">
        <div class="mini-av" id="m1">&#128218;</div>
        <div class="cat-title">어떤 민원이신가요?</div>
      </div>
      <div class="cat-hint">항목을 탭하면 바로 다음 단계로 이동합니다</div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- S2 작성 -->
    <div class="screen hide-right" id="s2">
      <div class="s2-bar">
        <div class="s2-ico" id="s2Ico"></div>
        <div>
          <div class="s2-name" id="s2Name"></div>
          <div class="s2-sub">내용을 적어 주세요</div>
        </div>
      </div>
      <div class="s2-form">
        <div>
          <div class="f-label">&#128221; 민원 내용 <span style="color:#d93030;font-size:10px;font-weight:400">필수</span></div>
          <textarea class="ta" id="ta"
            placeholder="예) 3층 열람실 에어컨이 작동하지 않아 매우 더운 상황입니다. 빠른 조치 부탁드립니다."
            maxlength="400" oninput="onTa(this)"></textarea>
          <div class="char-cnt"><span id="taLen">0</span> / 400자</div>
        </div>
        <div>
          <div class="f-label">&#128247; 사진 첨부 <span style="font-size:10px;font-weight:400;color:var(--ink3)">선택 · 최대 3장</span></div>
          <div class="photo-box" id="photoBox">
            <input type="file" accept="image/*" multiple onchange="onPhoto(event)">
            <div class="photo-ico">&#128247;</div>
            <div>
              <div class="photo-txt">사진 첨부하기</div>
              <div class="photo-sub">탭하여 선택 · JPG, PNG, HEIC</div>
            </div>
          </div>
          <div class="thumb-strip" id="thumbStrip"></div>
        </div>
      </div>
    </div>

    <!-- S3 분석 + 완료 -->
    <div class="screen hide-right" id="s3">

      <!-- 분석 로딩 페이즈 -->
      <div id="ph-load" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--navy);z-index:2;transition:opacity .4s">
        <div class="spin-orb">
          <div class="spin-inner" id="m3load">&#128218;</div>
        </div>
        <div class="spin-title">민원을 분석하고 있어요</div>
        <div class="spin-sub">Gemini AI가 요지를 파악 중입니다...</div>
        <div class="spin-dots"><span></span><span></span><span></span></div>
      </div>

      <!-- 결과 페이즈 -->
      <div id="ph-result" style="position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .5s">
        <div class="done-top">
          <div class="done-mascot" id="m3">&#128218;</div>
        </div>
        <div class="done-bot">
          <!-- AI 말풍선 -->
          <div class="done-bubble" id="aiBubble" style="opacity:0;transform:translateY(10px);transition:opacity .4s,transform .4s">
            <div class="done-msg" id="aiMsg"></div>
          </div>
          <!-- 전달 이펙트 -->
          <div id="sendWrap" style="display:flex;flex-direction:column;gap:12px;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="font-size:11px;color:var(--ink3);white-space:nowrap">담당자에게 전달 중</div>
              <div style="flex:1;height:2px;border-radius:2px;background:rgba(0,0,0,.1);overflow:hidden">
                <div id="sendLine" style="height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width 1.2s cubic-bezier(.4,0,.2,1);border-radius:2px"></div>
              </div>
              <div style="width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);flex-shrink:0;animation:ldot 1.5s ease-in-out infinite"></div>
            </div>
            <div class="del-card" id="delCard" style="opacity:0;transform:translateY(10px);transition:opacity .5s .5s,transform .5s .5s">
              <div class="del-ico-wrap">
                <div class="del-ring"></div><div class="del-ring"></div><div class="del-ring"></div>
                <div class="del-ico">&#128232;</div>
              </div>
              <div class="del-info">
                <div class="del-title">종로도서관 담당자에게 전달 완료</div>
                <div class="del-sub">즉시 처리를 시작합니다</div>
              </div>
              <div class="del-badge">전달됨</div>
            </div>
            <button class="again-btn" onclick="restart()">&#8617; 처음으로 돌아가기</button>
          </div>
        </div>
      </div>

    </div>

  </div>
  <div class="bottom" id="nav" style="display:none">
    <div class="nav-row">
      <button class="btn-back" id="btnBack" onclick="back()">&#8592;</button>
      <button class="btn-next" id="btnNext" onclick="next()">다음 &#8594;</button>
    </div>
  </div>
</div>

<script>
const CFG={
  libName:"종로도서관",svcName:"종로도서관 민원 도우미",
  mascotEmoji:"📚",mascotImg:"",workerUrl:"",
  geminiKey:"",  /* Google AI Studio에서 발급 */
  cats:[
    {icon:"🔊",color:"#EDE9FE",label:"소음·소란",desc:"시끄럽거나 소란스러워요"},
    {icon:"🔧",color:"#FEE2E2",label:"시설 고장",desc:"시설·기기가 고장났어요"},
    {icon:"🎫",color:"#FEF3C7",label:"이중발권",desc:"좌석 이중 발권 문제"},
    {icon:"🌡️",color:"#DBEAFE",label:"기온 문제",desc:"너무 덥거나 추워요"},
    {icon:"💨",color:"#D1FAE5",label:"환기 문제",desc:"공기가 답답하거나 탁해요"},
    {icon:"👃",color:"#FCE7F3",label:"냄새",desc:"불쾌한 냄새가 나요"},
    {icon:"🧹",color:"#ECFDF5",label:"청결·위생",desc:"청소가 필요해요"},
    {icon:"💬",color:"#F3F4F6",label:"기타 건의",desc:"그 밖의 불편사항"},
  ]
};
let cur=0,selCat=null,photos=[];
window.addEventListener('DOMContentLoaded',()=>{applyM();buildCats();document.title=CFG.svcName;document.getElementById('hdrName').textContent=CFG.svcName;document.getElementById('s0Lib').textContent=CFG.libName;uiSync()});
function applyM(){['m0','m1','m3'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.querySelectorAll('img').forEach(i=>i.remove());if(CFG.mascotImg){const img=document.createElement('img');img.src=CFG.mascotImg;img.alt='';el.prepend(img);el.classList.add('no-bg')}else{el.classList.remove('no-bg');if(!el.querySelector('img'))el.textContent=CFG.mascotEmoji}})}
function buildCats(){if(!document.getElementById('_ca')){const s=document.createElement('style');s.id='_ca';s.textContent='@keyframes cIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}';document.head.appendChild(s)}document.getElementById('catGrid').innerHTML=CFG.cats.map((c,i)=>`<div class="cat-card" data-i="${i}" onclick="pickCat(${i})" style="animation:cIn .3s ${i*.06}s ease both;opacity:0"><div class="sel-dot">✓</div><div class="cat-ico-box"><div class="cat-ico-bg" style="background:${c.color}"></div>${c.icon}</div><div class="cat-lbl">${c.label}</div><div class="cat-desc">${c.desc}</div></div>`).join('')}
function pickCat(i){selCat=i;document.querySelectorAll('.cat-card').forEach(el=>el.classList.remove('sel'));document.querySelector('.cat-card[data-i="'+i+'"]').classList.add('sel');uiSync();setTimeout(()=>go(2),250)}
function onTa(el){document.getElementById('taLen').textContent=el.value.length;uiSync()}
function onPhoto(e){if(photos.length>=3){toast('사진은 최대 3장까지입니다');return}Array.from(e.target.files).slice(0,3-photos.length).forEach(f=>{const r=new FileReader();r.onload=ev=>{photos.push(ev.target.result);renderT()};r.readAsDataURL(f)});e.target.value=''}
function renderT(){document.getElementById('thumbStrip').innerHTML=photos.map((s,i)=>`<div class="tw"><img class="th-img" src="${s}"><div class="th-del" onclick="rmP(${i})">✕</div></div>`).join('');document.getElementById('photoBox').style.display=photos.length>=3?'none':''}
function rmP(i){photos.splice(i,1);renderT()}
function go(n){const from=document.getElementById('s'+cur);const to=document.getElementById('s'+n);const fwd=n>cur;from.className='screen '+(fwd?'hide-left':'hide-right');to.className='screen show';cur=n;if(n===2){const c=CFG.cats[selCat];document.getElementById('s2Ico').textContent=c.icon;document.getElementById('s2Name').textContent=c.label+' 민원'}if(n===3)done();uiSync();const pct=[0,28,60,100][cur]||0;document.getElementById('progFill').style.width=pct+'%'}
function back(){if(cur>1)go(cur-1)}
function next(){if(cur===1){if(selCat===null){toast('유형을 선택해 주세요');return}go(2)}else if(cur===2){if(!document.getElementById('ta').value.trim()){toast('민원 내용을 입력해 주세요');return}go(3)}}
function restart(){
  selCat=null;photos=[];
  document.getElementById('ta').value='';
  document.getElementById('taLen').textContent='0';
  document.getElementById('thumbStrip').innerHTML='';
  document.getElementById('photoBox').style.display='';
  // S3 초기화
  document.getElementById('ph-load').style.opacity='1';
  document.getElementById('ph-load').style.pointerEvents='all';
  document.getElementById('ph-result').style.opacity='0';
  document.getElementById('ph-result').style.pointerEvents='none';
  document.getElementById('aiMsg').innerHTML='';
  document.getElementById('aiBubble').style.opacity='0';
  document.getElementById('aiBubble').style.transform='translateY(10px)';
  document.getElementById('sendWrap').style.opacity='0';
  document.getElementById('sendWrap').style.transform='translateY(10px)';
  document.getElementById('sendLine').style.width='0%';
  document.getElementById('delCard').style.opacity='0';
  document.getElementById('delCard').style.transform='translateY(10px)';
  buildCats();go(0);
}
function uiSync(){const nav=document.getElementById('nav');const back=document.getElementById('btnBack');const next=document.getElementById('btnNext');nav.style.display=(cur===1||cur===2)?'':'none';back.disabled=cur<=1;next.textContent=cur===2?'접수하기 →':'다음 →';if(cur===1)next.disabled=selCat===null;else if(cur===2)next.disabled=!document.getElementById('ta')?.value?.trim();else next.disabled=false}
async function done(){
  const cat=CFG.cats[selCat];
  const content=document.getElementById('ta').value.trim();

  // 로딩 페이즈 표시
  const phLoad=document.getElementById('ph-load');
  const phResult=document.getElementById('ph-result');
  phLoad.style.opacity='1'; phLoad.style.pointerEvents='all';
  phResult.style.opacity='0'; phResult.style.pointerEvents='none';

  // 마스코트 로딩 orb 적용
  const mLoad=document.getElementById('m3load');
  if(CFG.mascotImg){
    mLoad.querySelectorAll('img').forEach(i=>i.remove());
    const img=document.createElement('img');img.src=CFG.mascotImg;img.alt='';mLoad.prepend(img);mLoad.classList.add('no-bg');
  } else { mLoad.textContent=CFG.mascotEmoji; }

  // Worker 전송 (있을 때)
  if(CFG.workerUrl){
    fetch(CFG.workerUrl+'/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:cat.label,content,photos})}).catch(e=>console.warn(e));
  }

  // Gemini 분석
  let aiText = await callGemini(cat, content);

  // 로딩 → 결과 전환
  phLoad.style.opacity='0'; phLoad.style.pointerEvents='none';
  await sleep(400);
  phResult.style.opacity='1'; phResult.style.pointerEvents='all';

  // 말풍선 타이핑
  const bubble=document.getElementById('aiBubble');
  bubble.style.opacity='1'; bubble.style.transform='translateY(0)';
  await typeText(document.getElementById('aiMsg'), aiText);
  await sleep(300);

  // 전달 이펙트
  const sw=document.getElementById('sendWrap');
  sw.style.opacity='1'; sw.style.transform='translateY(0)';
  await sleep(80);
  document.getElementById('sendLine').style.width='100%';
  await sleep(700);
  const dc=document.getElementById('delCard');
  dc.style.opacity='1'; dc.style.transform='translateY(0)';

  // 폭죽
  setTimeout(confetti, 200);
}

async function callGemini(cat, content){
  const key = CFG.geminiKey;
  const fallback = `귀하께서 접수하신 민원은 '${cat.label} 관련 민원'인 것으로 이해됩니다! 불편을 드려 정말 죄송합니다. 담당자에게 즉시 전달하여 빠르게 처리하겠습니다.`;

  // Worker URL 있으면 Worker 통해 안전 호출
  if(CFG.workerUrl){
    try{
      const res=await fetch(CFG.workerUrl+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:cat.label,content})});
      const d=await res.json(); return d.summary||fallback;
    }catch(e){ return fallback; }
  }

  // 직접 호출 (API 키 있을 때)
  if(!key){ await sleep(1400); return fallback; }

  const prompt=`당신은 종로도서관 AI 민원 도우미입니다.
다음 형식으로만 1~2문장 답하세요:
"귀하께서 접수하신 민원은 '[핵심 키워드]'인 것으로 이해됩니다! [따뜻한 공감 문장]. 담당자에게 즉시 전달하여 빠르게 처리하겠습니다."
규칙: [핵심 키워드]는 2~4단어 명사구, 동사형 금지, 한국어만
민원 유형: ${cat.label}
민원 내용: ${content}`;

  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:160,temperature:0.65}})
    });
    const d=await res.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||fallback;
  }catch(e){ return fallback; }
}

async function typeText(el, text){
  el.innerHTML='<span class="t-cursor"></span>';
  let i=0;
  await sleep(100);
  await new Promise(res=>{
    const iv=setInterval(()=>{
      i++;
      const rendered=text.slice(0,i).replace(/'([^']*)'/g,"<span class='ai-key'>'$1'</span>");
      el.innerHTML=rendered+(i<text.length?'<span class="t-cursor"></span>':'');
      if(i>=text.length){clearInterval(iv);res();}
    },32);
  });
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function confetti(){const c=document.getElementById('cvs'),ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;const cols=['#1660B8','#08A89A','#E6991A','#12A05A','#7C3AED','#EC4899','#F97316'];const ps=Array.from({length:150},()=>({x:c.width*.5+(Math.random()-.5)*c.width*.35,y:c.height*.45,vx:(Math.random()-.5)*14,vy:-(Math.random()*20+8),r:Math.random()*7+3,col:cols[Math.floor(Math.random()*cols.length)],tilt:0,tv:(Math.random()-.5)*.4,op:1,sh:Math.random()<.33?'c':Math.random()<.5?'r':'t'}));let f=0;(function draw(){ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{ctx.save();ctx.globalAlpha=p.op;ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.tilt*Math.PI/180);if(p.sh==='c'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill()}else if(p.sh==='r'){ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r)}else{ctx.beginPath();ctx.moveTo(0,-p.r);ctx.lineTo(p.r,p.r);ctx.lineTo(-p.r,p.r);ctx.closePath();ctx.fill()}ctx.restore();p.x+=p.vx;p.y+=p.vy;p.vy+=.55;p.tilt+=p.tv;if(p.y>c.height*.65)p.op-=.028});f++;if(f<130&&ps.some(p=>p.op>0))requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height)})()}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2200)}
</script>
</body>
</html>
