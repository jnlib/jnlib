<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>종로도서관 민원 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --navy:#1a3a5c;
  --blue:#1660B8;
  --teal:#08A89A;
  --gold:#E6991A;
  --green:#12A05A;
  --cream:#F0F4FA;
  --white:#fff;
  --ink:#1a1a2e;
  --ink2:#444460;
  --ink3:#8888a0;
  --card-bg:#ffffff;
  --shell-bg:#F0F4FA;
  --hdr-bg:#ffffff;
  --hdr-border:rgba(22,96,184,.15);
  --bottom-bg:#ffffff;
  --s3-top:#EBF3FF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#d8e6f5;display:flex;justify-content:center;align-items:center}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(22,96,184,.12),transparent 65%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(8,168,154,.1),transparent 65%)}
.shell{width:100%;max-width:430px;height:100%;height:100dvh;position:relative;z-index:1;display:flex;flex-direction:column;background:var(--shell-bg);overflow:hidden;box-shadow:0 0 60px rgba(22,96,184,.18)}
.hdr{background:var(--hdr-bg);padding:12px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0;position:relative;border-bottom:1px solid var(--hdr-border)}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue) 30%,var(--teal) 70%,transparent)}
.hdr-av{width:36px;height:36px;border-radius:10px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center}
.hdr-av img{width:100%;height:100%;object-fit:contain}
.hdr-name{font-size:16px;font-weight:700;color:var(--navy)}
.hdr-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.prog{height:3px;background:rgba(22,96,184,.1);flex-shrink:0}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .4s ease}
.screens{flex:1;position:relative;overflow:hidden;min-height:0;z-index:1}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .38s ease;overflow:hidden}
.screen.hide-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.hide-right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.show{transform:translateX(0);opacity:1;pointer-events:all}

/* S0 인트로 */
#s0{background:linear-gradient(160deg,#EBF3FF 0%,#E0F2F0 100%);align-items:center;justify-content:center}
.blob{position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none;animation:blobF ease-in-out infinite}
.bl1{width:260px;height:260px;background:rgba(22,96,184,.15);top:-80px;right:-60px;animation-duration:8s}
.bl2{width:180px;height:180px;background:rgba(8,168,154,.12);bottom:60px;left:-60px;animation-duration:9s;animation-delay:3s}
@keyframes blobF{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.s0-inner{display:flex;flex-direction:column;align-items:center;padding:32px 28px 44px;position:relative;z-index:1}
.mascot-wrap{position:relative;margin-bottom:28px;display:flex;align-items:center;justify-content:center}
.m-ring{display:none}
.mr1{display:none}
.mr2{display:none}
@keyframes rP{0%,100%{opacity:.8}50%{opacity:.2}}
.mascot{width:230px;height:230px;border-radius:0;background:none;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;animation:mH 4s ease-in-out infinite}
.mascot img{width:100%;height:100%;object-fit:contain;border-radius:0;filter:drop-shadow(0 0 40px rgba(22,96,184,.45)) drop-shadow(0 0 80px rgba(8,168,154,.25)) drop-shadow(0 18px 32px rgba(0,0,0,.15))}
@keyframes mH{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.s0-lib{font-size:16px;font-weight:700;color:var(--blue);text-align:center;margin-bottom:6px;opacity:.7}
.s0-title{font-size:32px;font-weight:900;color:var(--navy);text-align:center;line-height:1.3;margin-bottom:9px}
.s0-sub{font-size:17px;color:var(--ink2);text-align:center;line-height:1.7;margin-bottom:36px}
.start-btn{width:100%;max-width:300px;padding:18px 24px;border:none;border-radius:22px;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--teal));box-shadow:0 8px 28px rgba(22,96,184,.35),inset 0 1px 0 rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;gap:12px;transition:transform .15s;animation:bIn .6s .4s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes bIn{from{transform:scale(.85) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.start-btn:active{transform:scale(.96)}
.start-btn-ico{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.start-btn-main{display:block;font-size:20px;font-weight:800;color:#fff;font-family:'Noto Sans KR',sans-serif;text-align:left}
.start-btn-sub{display:block;font-size:14px;color:rgba(255,255,255,.75);font-family:'Noto Sans KR',sans-serif;margin-top:2px;text-align:left}

/* S1 카테고리 */
#s1{background:var(--shell-bg);padding:18px;overflow-y:auto}
#s1::-webkit-scrollbar{width:0}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.mini-av{width:32px;height:32px;border-radius:9px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center}
.mini-av img{width:100%;height:100%;object-fit:contain}
.cat-title{font-size:20px;font-weight:700;color:var(--navy)}
.cat-hint{font-size:14px;color:var(--ink3);padding-left:42px;margin-bottom:16px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-card{background:var(--card-bg);border-radius:18px;padding:14px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;border:2.5px solid transparent;box-shadow:0 2px 12px rgba(22,96,184,.08);transition:all .18s ease;position:relative;overflow:hidden;user-select:none}
.cat-card:active{transform:scale(.95)}
.cat-card.sel{border-color:var(--blue);background:linear-gradient(135deg,rgba(22,96,184,.06),rgba(8,168,154,.04));box-shadow:0 4px 20px rgba(22,96,184,.18)}
.cat-ico-box{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:32px}
.cat-lbl{font-size:15px;font-weight:700;color:var(--ink);text-align:center}
/* cat-desc 완전히 숨김 */
.cat-desc{display:none}
.sel-dot{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transform:scale(0);transition:transform .2s cubic-bezier(.175,.885,.32,1.275)}
.cat-card.sel .sel-dot{transform:scale(1)}

/* S2 작성 */
#s2{background:var(--shell-bg)}
.s2-bar{background:var(--hdr-bg);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--hdr-border)}
.s2-ico{font-size:24px;flex-shrink:0}
.s2-name{font-size:18px;font-weight:700;color:var(--navy)}
.s2-sub{font-size:14px;color:var(--ink3);margin-top:1px}
.s2-form{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;min-height:0}
.s2-form::-webkit-scrollbar{width:0}
.f-label{font-size:15px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.ta{width:100%;height:200px;background:var(--card-bg);border:2px solid rgba(22,96,184,.12);border-radius:16px;padding:14px 16px;font-size:17px;font-family:'Noto Sans KR',sans-serif;color:var(--ink);line-height:1.7;resize:none;outline:none;box-shadow:0 2px 10px rgba(22,96,184,.06);transition:border .2s,box-shadow .2s;display:block}
.ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(22,96,184,.1)}
.ta::placeholder{color:#b0b8cc}
.char-cnt{font-size:14px;color:var(--ink3);text-align:right;margin-top:4px}

/* S3 분석+완료 */
#s3{background:var(--s3-top)}
.done-top{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#EBF3FF 0%,#E0F2F0 100%);position:relative;min-height:0}
.done-top::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(22,96,184,.12),transparent 70%)}
.done-mascot{width:200px;height:200px;z-index:1;background:none;display:flex;align-items:center;justify-content:center;animation:mH 3.5s ease-in-out infinite}
.done-mascot img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 36px rgba(22,96,184,.45)) drop-shadow(0 0 70px rgba(8,168,154,.2)) drop-shadow(0 14px 24px rgba(0,0,0,.12))}
.done-bot{background:var(--card-bg);border-radius:28px 28px 0 0;padding:22px 20px 20px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;animation:sU .4s .1s ease both;box-shadow:0 -4px 24px rgba(22,96,184,.1)}
@keyframes sU{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.done-bubble{background:#F0F6FF;border-radius:4px 20px 20px 20px;padding:16px 18px;box-shadow:0 3px 14px rgba(22,96,184,.08);position:relative;border:1px solid rgba(22,96,184,.1)}
.done-bubble::before{content:'';position:absolute;top:0;left:-6px;border:7px solid transparent;border-right-color:#F0F6FF;border-top-color:#F0F6FF}
.done-msg{font-size:17px;color:var(--ink);line-height:1.8}
.del-card{background:rgba(18,160,90,.08);border:1.5px solid rgba(18,160,90,.22);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:13px}
.del-ico-wrap{position:relative;flex-shrink:0}
.del-ico{width:44px;height:44px;border-radius:12px;background:rgba(18,160,90,.12);display:flex;align-items:center;justify-content:center;font-size:20px}
.del-ring{position:absolute;border-radius:50%;border:2px solid rgba(18,160,90,.3);animation:dR 1.5s ease-out forwards}
.del-ring:nth-child(2){animation-delay:.3s}.del-ring:nth-child(3){animation-delay:.6s}
@keyframes dR{from{width:44px;height:44px;top:0;left:0;opacity:.8}to{width:82px;height:82px;top:-19px;left:-19px;opacity:0}}
.del-info{flex:1}
.del-title{font-size:16px;font-weight:700;color:var(--green);margin-bottom:2px}
.del-sub{font-size:13px;color:var(--ink3)}
.del-badge{background:rgba(18,160,90,.12);border:1px solid rgba(18,160,90,.22);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
.again-btn{font-size:16px;color:var(--ink3);text-decoration:underline;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center}

/* 로딩 (분석중) */
#ph-load{background:linear-gradient(160deg,#EBF3FF 0%,#E0F2F0 100%) !important}
.spin-orb{width:130px;height:130px;border-radius:50%;background:conic-gradient(from 0deg,var(--blue),var(--teal),var(--gold),var(--blue));display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:orbSpin 2.2s linear infinite;box-shadow:0 0 50px rgba(22,96,184,.25)}
@keyframes orbSpin{to{transform:rotate(360deg)}}
.spin-inner{width:108px;height:108px;border-radius:50%;background:#EBF3FF;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:orbSpin 2.2s linear infinite reverse}
.spin-inner img{width:80%;height:80%;object-fit:contain}
.spin-title{font-size:20px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:6px}
.spin-sub{font-size:16px;color:var(--ink3);text-align:center;margin-bottom:18px}
.spin-dots{display:flex;gap:8px;justify-content:center}
.spin-dots span{width:9px;height:9px;border-radius:50%;animation:dotB 1.2s ease-in-out infinite}
.spin-dots span:nth-child(1){background:var(--blue)}
.spin-dots span:nth-child(2){background:var(--teal);animation-delay:.2s}
.spin-dots span:nth-child(3){background:var(--gold);animation-delay:.4s}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1.1);opacity:1}}

/* 공통 */
.bottom{padding:10px 18px 14px;flex-shrink:0;background:var(--bottom-bg);border-top:1px solid rgba(22,96,184,.1)}
.nav-row{display:flex;gap:10px}
.btn-back{width:56px;height:56px;border-radius:14px;background:#fff;border:1.5px solid rgba(22,96,184,.15);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(22,96,184,.06);transition:all .15s;color:var(--navy)}
.btn-back:disabled{opacity:.28;cursor:not-allowed}
.btn-next{flex:1;height:56px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));font-size:18px;font-weight:700;color:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 5px 20px rgba(22,96,184,.3);transition:all .15s}
.btn-next:active{transform:scale(.97)}
.btn-next:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
#cvs{position:fixed;inset:0;pointer-events:none;z-index:9999}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(26,58,92,.9);color:#fff;padding:12px 24px;border-radius:24px;font-size:16px;pointer-events:none;opacity:0;transition:all .28s;z-index:8888;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.t-cursor{display:inline-block;width:2px;height:1em;background:var(--teal);margin-left:2px;vertical-align:middle;animation:tcBlink .7s step-end infinite}
@keyframes tcBlink{0%,100%{opacity:1}50%{opacity:0}}
.ai-key{color:var(--blue);font-weight:700}
@keyframes ldot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div class="toast" id="toast"></div>
<div class="shell">
  <div class="hdr">
    <div class="hdr-av"><img src="https://raw.githubusercontent.com/jnlib/jnlib/main/mascot.png" alt=""></div>
    <div>
      <div class="hdr-name">종로도서관 민원 도우미</div>
      <div class="hdr-sub">AI 응대 중 · 온라인</div>
    </div>
  </div>
  <div class="prog"><div class="prog-fill" id="progFill"></div></div>
  <div class="screens">

    <!-- S0 인트로 -->
    <div class="screen show" id="s0">
      <div class="blob bl1"></div><div class="blob bl2"></div>
      <div class="s0-inner">
        <div class="mascot-wrap">
          <div class="m-ring mr2"></div><div class="m-ring mr1"></div>
          <div class="mascot"><img src="https://raw.githubusercontent.com/jnlib/jnlib/main/mascot.png" alt=""></div>
        </div>
        <div class="s0-lib">종로도서관</div>
        <div class="s0-title">무엇을<br>도와드릴까요?</div>
        <div class="s0-sub">안녕하세요! 저는 종로도서관 AI 도우미 로로예요. <br>시설 불편사항을 접수해 드릴게요.</div>
        <button class="start-btn" onclick="go(1)">
          <div class="start-btn-ico">📋</div>
          <div>
            <span class="start-btn-main">민원 접수하기</span>
            <span class="start-btn-sub">AI가 즉시 분석 · 담당자 전달</span>
          </div>
        </button>
      </div>
    </div>

    <!-- S1 카테고리 -->
    <div class="screen hide-right" id="s1">
      <div style="flex:1;overflow-y:auto;padding:18px 18px 0;">
        <div class="cat-hdr">
          <div class="mini-av"><img src="https://raw.githubusercontent.com/jnlib/jnlib/main/mascot.png" alt=""></div>
          <div class="cat-title">어떤 민원이신가요?</div>
        </div>
        <div class="cat-hint">항목을 탭하면 바로 다음 단계로 이동합니다</div>
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <div class="bottom" id="nav1">
        <div class="nav-row">
          <button class="btn-back" onclick="back()">←</button>
          <button class="btn-next" id="btnNext1" onclick="next()">다음 →</button>
        </div>
      </div>
    </div>

    <!-- S2 작성 -->
    <div class="screen hide-right" id="s2">
      <div class="s2-bar">
        <div class="s2-ico" id="s2Ico"></div>
        <div>
          <div class="s2-name" id="s2Name"></div>
          <div class="s2-sub">내용을 적어 주세요</div>
        </div>
      </div>
      <div class="s2-form">
        <div>
          <div class="f-label">📝 민원 내용 <span style="color:#d93030;font-size:13px;font-weight:400">필수</span></div>
          <textarea class="ta" id="ta" maxlength="400" oninput="onTa(this)"></textarea>
          <div class="char-cnt"><span id="taLen">0</span> / 400자</div>
        </div>
      </div>
      <div class="bottom" id="nav2">
        <div class="nav-row">
          <button class="btn-back" onclick="back()">←</button>
          <button class="btn-next" id="btnNext2" onclick="next()">접수하기 →</button>
        </div>
      </div>
    </div>

    <!-- S3 분석 + 완료 -->
    <div class="screen hide-right" id="s3">
      <div id="ph-load" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;transition:opacity .4s">
        <div class="spin-orb">
          <div class="spin-inner"><img src="https://raw.githubusercontent.com/jnlib/jnlib/main/mascot.png" alt=""></div>
        </div>
        <div class="spin-title">민원을 분석하고 있어요</div>
        <div class="spin-sub">AI가 요지를 파악 중입니다...</div>
        <div class="spin-dots"><span></span><span></span><span></span></div>
      </div>

      <div id="ph-result" style="position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .5s">
        <div class="done-top">
          <div class="done-mascot"><img src="https://raw.githubusercontent.com/jnlib/jnlib/main/mascot.png" alt=""></div>
        </div>
        <div class="done-bot">
          <div class="done-bubble" id="aiBubble" style="opacity:0;transform:translateY(10px);transition:opacity .4s,transform .4s">
            <div class="done-msg" id="aiMsg"></div>
          </div>
          <div id="sendWrap" style="display:flex;flex-direction:column;gap:12px;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="font-size:14px;color:var(--ink3);white-space:nowrap">담당자에게 전달 중</div>
              <div style="flex:1;height:2px;border-radius:2px;background:rgba(22,96,184,.1);overflow:hidden">
                <div id="sendLine" style="height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width 1.2s cubic-bezier(.4,0,.2,1);border-radius:2px"></div>
              </div>
              <div style="width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);flex-shrink:0;animation:ldot 1.5s ease-in-out infinite"></div>
            </div>
            <div class="del-card" id="delCard" style="opacity:0;transform:translateY(10px);transition:opacity .5s .5s,transform .5s .5s">
              <div class="del-ico-wrap">
                <div class="del-ring"></div><div class="del-ring"></div><div class="del-ring"></div>
                <div class="del-ico">📨</div>
              </div>
              <div class="del-info">
                <div class="del-title">종로도서관 담당자에게 전달 완료</div>
                <div class="del-sub" id="emailStatus">이메일 발송 중...</div>
              </div>
              <div class="del-badge">전달됨</div>
            </div>
            <button class="again-btn" onclick="restart()">↩ 처음으로 돌아가기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const CFG = {
  workerUrl:         "https://complaint-worker.hdh1231.workers.dev",
  emailjsServiceId:  "service_0mfeyck",
  emailjsTemplateId: "template_i62u3k4",
  emailjsPublicKey:  "d4Hm2-cxsNAYvEaV3",
  cats: [
    {
      icon:"🔊", color:"#EDE9FE", label:"소음·소란",
      placeholder:"예) 자율학습실에서 옆 이용자가 큰 소리로 통화하거나 대화를 해서 집중이 어렵습니다. 조용한 이용 환경을 만들어 주세요."
    },
    {
      icon:"🔧", color:"#FEE2E2", label:"시설 고장",
      placeholder:"예) 화장실 전등이 켜지지 않아 어둡습니다. 빠른 수리 부탁드립니다."
    },
    {
      icon:"🎫", color:"#FEF3C7", label:"이중발권",
      placeholder:"예) 한 이용자가 좌석 2자리를 점유하고 있는 것 같습니다. 확인 및 조치 부탁드립니다."
    },
    {
      icon:"🌡️", color:"#DBEAFE", label:"기온 문제",
      placeholder:"예) 자율학습실이 너무 춥습니다. 에어컨 온도를 조금 올려주시면 감사하겠습니다."
    },
    {
      icon:"💨", color:"#D1FAE5", label:"환기·냄새",
      placeholder:"예) 실내 공기가 답답하거나 불쾌한 냄새가 납니다. 환기 또는 확인 후 조치해 주시면 감사하겠습니다."
    },
    {
      icon:"💬", color:"#F3F4F6", label:"기타 건의",
      placeholder:"불편하신 점이나 건의 사항을 자유롭게 작성해 주세요."
    },
  ]
};

let cur = 0, selCat = null;
emailjs.init(CFG.emailjsPublicKey);

window.addEventListener('DOMContentLoaded', () => { buildCats(); uiSync(); });

function buildCats() {
  if (!document.getElementById('_ca')) {
    const s = document.createElement('style');
    s.id = '_ca';
    s.textContent = '@keyframes cIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}';
    document.head.appendChild(s);
  }
  document.getElementById('catGrid').innerHTML = CFG.cats.map((c, i) =>
    `<div class="cat-card" data-i="${i}" onclick="pickCat(${i})" style="animation:cIn .3s ${i*.06}s ease both;opacity:0">
      <div class="sel-dot">✓</div>
      <div class="cat-ico-box">${c.icon}</div>
      <div class="cat-lbl">${c.label}</div>
    </div>`
  ).join('');
}

function pickCat(i) {
  selCat = i;
  document.querySelectorAll('.cat-card').forEach(el => el.classList.remove('sel'));
  document.querySelector(`.cat-card[data-i="${i}"]`).classList.add('sel');
  uiSync();
  setTimeout(() => go(2), 250);
}

function onTa(el) {
  document.getElementById('taLen').textContent = el.value.length;
  uiSync();
}

function go(n) {
  const from = document.getElementById('s' + cur);
  const to = document.getElementById('s' + n);
  const fwd = n > cur;
  from.className = 'screen ' + (fwd ? 'hide-left' : 'hide-right');
  to.className = 'screen show';
  cur = n;
  if (n === 2) {
    const c = CFG.cats[selCat];
    document.getElementById('s2Ico').textContent = c.icon;
    document.getElementById('s2Name').textContent = c.label + ' 민원';
    document.getElementById('ta').placeholder = c.placeholder;
  }
  if (n === 3) done();
  uiSync();
}

function back() {
  if (cur <= 0) return;
  const target = cur - 1;
  if (cur === 2) {
    document.getElementById('ta').value = '';
    document.getElementById('taLen').textContent = '0';
  }
  const from = document.getElementById('s' + cur);
  const to   = document.getElementById('s' + target);
  from.className = 'screen hide-right';
  to.className   = 'screen show';
  cur = target;
  uiSync();
}

function next() {
  if (cur === 1) {
    if (selCat === null) { toast('유형을 선택해 주세요'); return; }
    go(2);
  } else if (cur === 2) {
    if (!document.getElementById('ta').value.trim()) { toast('민원 내용을 입력해 주세요'); return; }
    go(3);
  }
}

function restart() {
  selCat = null;
  document.getElementById('ta').value = '';
  document.getElementById('taLen').textContent = '0';
  document.getElementById('ph-load').style.opacity = '1';
  document.getElementById('ph-load').style.pointerEvents = 'all';
  document.getElementById('ph-result').style.opacity = '0';
  document.getElementById('ph-result').style.pointerEvents = 'none';
  document.getElementById('aiMsg').innerHTML = '';
  document.getElementById('aiBubble').style.opacity = '0';
  document.getElementById('aiBubble').style.transform = 'translateY(10px)';
  document.getElementById('sendWrap').style.opacity = '0';
  document.getElementById('sendWrap').style.transform = 'translateY(10px)';
  document.getElementById('sendLine').style.width = '0%';
  document.getElementById('delCard').style.opacity = '0';
  document.getElementById('delCard').style.transform = 'translateY(10px)';
  document.getElementById('emailStatus').textContent = '이메일 발송 중...';
  buildCats();
  go(0);
}

function uiSync() {
  const ta = document.getElementById('ta');
  const hasText = ta && ta.value.trim().length > 0;
  const n1 = document.getElementById('btnNext1');
  if (n1) n1.disabled = selCat === null;
  const n2 = document.getElementById('btnNext2');
  if (n2) n2.disabled = !hasText;
  const pct = [0, 28, 60, 100][cur] || 0;
  document.getElementById('progFill').style.width = pct + '%';
}

async function done() {
  const cat = CFG.cats[selCat];
  const content = document.getElementById('ta').value.trim();

  document.getElementById('ph-load').style.opacity = '1';
  document.getElementById('ph-load').style.pointerEvents = 'all';
  document.getElementById('ph-result').style.opacity = '0';
  document.getElementById('ph-result').style.pointerEvents = 'none';

  let aiText = await callGemini(cat, content);
  sendEmail(cat, content, aiText);

  document.getElementById('ph-load').style.opacity = '0';
  document.getElementById('ph-load').style.pointerEvents = 'none';
  await sleep(400);
  document.getElementById('ph-result').style.opacity = '1';
  document.getElementById('ph-result').style.pointerEvents = 'all';

  const bubble = document.getElementById('aiBubble');
  bubble.style.opacity = '1';
  bubble.style.transform = 'translateY(0)';
  await typeText(document.getElementById('aiMsg'), aiText);
  await sleep(300);

  const sw = document.getElementById('sendWrap');
  sw.style.opacity = '1';
  sw.style.transform = 'translateY(0)';
  await sleep(80);
  document.getElementById('sendLine').style.width = '100%';
  await sleep(700);
  const dc = document.getElementById('delCard');
  dc.style.opacity = '1';
  dc.style.transform = 'translateY(0)';
  setTimeout(confetti, 200);
}

const CLOSING = '\n\n우리 도서관에 대한 관심에 감사드리며, 앞으로도 이용자분들의 쾌적한 시설 이용을 위해 노력하겠습니다.\n\n오늘도 즐거운 하루 보내시길 바라며, 자세한 문의는 안내데스크 방문 또는 유선연락(721-0729) 부탁드립니다.';

async function callGemini(cat, content) {
  const fallback = `귀하께서 접수하신 민원은 '${cat.label} 관련 민원'인 것으로 이해됩니다. 불편을 드려 정말 죄송합니다. 담당자에게 즉시 전달하여 빠르게 처리하겠습니다.${CLOSING}`;
  try {
    const res = await fetch(CFG.workerUrl + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: cat.label, content })
    });
    const data = await res.json();
    return (data.summary ? data.summary + CLOSING : fallback);
  } catch (e) { return fallback; }
}

async function sendEmail(cat, content, aiSummary) {
  const date = new Date().toLocaleString('ko-KR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  try {
    await emailjs.send(CFG.emailjsServiceId, CFG.emailjsTemplateId, {
      category:   cat.label,
      content:    content,
      date:       date,
      ai_summary: aiSummary,
    });
    document.getElementById('emailStatus').textContent = '이메일 발송 완료 ✓';
  } catch (e) {
    console.warn('이메일 발송 실패', e);
    document.getElementById('emailStatus').textContent = '즉시 처리를 시작합니다';
  }
}

async function typeText(el, text) {
  el.innerHTML = '<span class="t-cursor"></span>';
  let i = 0;
  await sleep(100);
  await new Promise(res => {
    const iv = setInterval(() => {
      i++;
      const rendered = text.slice(0, i)
        .replace(/\n/g, '<br>')
        .replace(/'([^']*)'/g, "<span class='ai-key'>'$1'</span>");
      el.innerHTML = rendered + (i < text.length ? '<span class="t-cursor"></span>' : '');
      if (i >= text.length) { clearInterval(iv); res(); }
    }, 22);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function confetti() {
  const c = document.getElementById('cvs'), ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const cols = ['#1660B8','#08A89A','#E6991A','#12A05A','#7C3AED','#EC4899','#F97316'];
  const ps = Array.from({ length: 150 }, () => ({
    x: c.width * .5 + (Math.random() - .5) * c.width * .35,
    y: c.height * .45,
    vx: (Math.random() - .5) * 14,
    vy: -(Math.random() * 20 + 8),
    r: Math.random() * 7 + 3,
    col: cols[Math.floor(Math.random() * cols.length)],
    tilt: 0, tv: (Math.random() - .5) * .4, op: 1,
    sh: Math.random() < .33 ? 'c' : Math.random() < .5 ? 'r' : 't'
  }));
  let f = 0;
  (function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ps.forEach(p => {
      ctx.save(); ctx.globalAlpha = p.op; ctx.fillStyle = p.col;
      ctx.translate(p.x, p.y); ctx.rotate(p.tilt * Math.PI / 180);
      if (p.sh === 'c') { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); }
      else if (p.sh === 'r') { ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r); }
      else { ctx.beginPath(); ctx.moveTo(0, -p.r); ctx.lineTo(p.r, p.r); ctx.lineTo(-p.r, p.r); ctx.closePath(); ctx.fill(); }
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.vy += .55; p.tilt += p.tv;
      if (p.y > c.height * .65) p.op -= .028;
    });
    f++;
    if (f < 130 && ps.some(p => p.op > 0)) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, c.width, c.height);
  })();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 2200);
}
</script>
